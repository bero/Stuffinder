        <div style="max-width:720px;margin:3rem auto;padding:1.5rem;font-family:Inter,system-ui,sans-serif;line-height:1.6;">
          <h1 style="font-size:2rem;margin:0 0 1rem;">Stuffinder</h1>
          <p><strong>Catalogue your stuff and find it in seconds.</strong></p>
          <p>Stuffinder is a free progressive web app that helps households keep track of their belongings. Take a photo when you put something away, tag its location and category, and search for it later from any device. Everyone in your household shares the same inventory.</p>
          <h2 style="font-size:1.25rem;margin:1.5rem 0 0.5rem;">Five core concepts</h2>
          <ul>
            <li><strong>Item</strong> — a single thing you own, with a photo, name and tags.</li>
            <li><strong>Location</strong> — where it lives, hierarchical (Garage &gt; Shelf 1).</li>
            <li><strong>Category</strong> — what kind of thing it is (Tools, Electronics, Documents…).</li>
            <li><strong>Tag</strong> — cross-cutting labels; an item can have any number.</li>
            <li><strong>Household</strong> — the shared scope. Invite members with a code.</li>
          </ul>
          <p>Stuffinder runs in your browser and installs as an app on iOS, Android, Windows and macOS. It is available in English, Swedish, Finnish, German, French, Italian, Spanish, Portuguese and Macedonian.</p>
          <p><strong>JavaScript is required to run the app.</strong> Please enable JavaScript and reload.</p>
        </div>
